<!DOCTYPE html>
<html lang="gl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>O Sauce Llorón · Portal de materiais</title>
  <meta name="description" content="Acceso ao portal web de materiais didácticos de IMSO 26/27.">

  <link rel="icon" href="IMSO_26-27/portal_web/assets/imax/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="IMSO_26-27/portal_web/assets/imax/favicon-32x32.png" sizes="32x32">

  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-1: #07111f;
      --bg-2: #0b2745;
      --brand: #0d6efd;
      --accent: #20c997;
      --gold: #ffc107;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 15% 15%, rgba(13, 110, 253, .42), transparent 32rem),
        radial-gradient(circle at 85% 20%, rgba(32, 201, 151, .30), transparent 30rem),
        radial-gradient(circle at 50% 110%, rgba(255, 193, 7, .18), transparent 28rem),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .08;
      background-image:
        linear-gradient(rgba(255,255,255,.45) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.45) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, #000, transparent 80%);
    }

    .landing {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .landing-card {
      width: min(960px, 100%);
      padding: clamp(2rem, 5vw, 4.2rem);
      border: 1px solid rgba(255, 255, 255, .16);
      border-radius: 34px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,.06)),
        rgba(255,255,255,.08);
      box-shadow: 0 28px 90px rgba(0,0,0,.30);
      backdrop-filter: blur(18px);
      text-align: center;
    }

    .brand-logo {
      width: 96px;
      height: 96px;
      display: grid;
      place-items: center;
      margin: 0 auto 1.4rem;
      border-radius: 30px;
      background: linear-gradient(135deg, var(--brand), var(--accent));
      box-shadow: 0 22px 50px rgba(13, 110, 253, .38);
    }

    .brand-logo img {
      width: 70px;
      height: 70px;
      object-fit: contain;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      padding: .45rem .75rem;
      border: 1px solid rgba(255,255,255,.20);
      border-radius: 999px;
      color: rgba(255,255,255,.84);
      background: rgba(255,255,255,.08);
      font-size: .82rem;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 1rem auto;
      max-width: 760px;
      font-size: clamp(2.4rem, 7vw, 5rem);
      font-weight: 900;
      line-height: .95;
      letter-spacing: -.07em;
    }

    .lead {
      max-width: 680px;
      margin: 0 auto;
      color: rgba(255,255,255,.78);
      font-size: clamp(1.05rem, 2vw, 1.28rem);
      font-weight: 500;
    }

    .actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: .85rem;
      margin-top: 2rem;
    }

    .btn-main {
      border: 0;
      border-radius: 999px;
      padding: .95rem 1.3rem;
      color: #06121f;
      background: linear-gradient(135deg, #fff, #d9fff4);
      box-shadow: 0 18px 42px rgba(0,0,0,.22);
      font-weight: 900;
    }

    .btn-main:hover {
      color: #06121f;
      transform: translateY(-1px);
    }

    .btn-secondary-soft {
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 999px;
      padding: .95rem 1.3rem;
      color: #fff;
      background: rgba(255,255,255,.08);
      font-weight: 850;
    }

    .btn-secondary-soft:hover {
      color: #fff;
      background: rgba(255,255,255,.14);
      border-color: rgba(255,255,255,.36);
    }

    .mini-info {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: .7rem;
      margin-top: 1.6rem;
      color: rgba(255,255,255,.72);
      font-size: .92rem;
      font-weight: 700;
    }

    .mini-info span {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      padding: .42rem .65rem;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      background: rgba(255,255,255,.07);
    }

    footer {
      margin-top: 2rem;
      color: rgba(255,255,255,.60);
      font-size: .9rem;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <main class="landing">
    <section class="landing-card" aria-labelledby="titulo">
      <div class="brand-logo">
        <img src="IMSO_26-27/portal_web/assets/imax/buho.svg" alt="" onerror="this.style.display='none'">
      </div>

      <span class="eyebrow">
        <i class="bi bi-cpu"></i>
        Portal docente
      </span>

      <h1 id="titulo">El Sauce Llorón</h1>

      <p class="lead">
        Acceso aos materiais web de IMSO 26/27: programación, unidades didácticas,
        apuntes, exercicios e prácticas.
      </p>

      <div class="actions">
        <a class="btn btn-main" href="IMSO_26-27/portal_web/index.html">
          <i class="bi bi-box-arrow-in-right me-2"></i>
          Entrar no portal IMSO
        </a>

        <a class="btn btn-secondary-soft" href="IMSO_26-27/portal_web/programacion-imso.html">
          <i class="bi bi-calendar3-range me-2"></i>
          Ver programación
        </a>
      </div>

      <div class="mini-info" aria-label="Resumo do portal">
        <span><i class="bi bi-folder2-open"></i> 4 unidades</span>
        <span><i class="bi bi-filetype-html"></i> materiais HTML</span>
        <span><i class="bi bi-tools"></i> prácticas e actividades</span>
      </div>

      <footer>
        Profesora: Silvia M. Peña Pérez · IMSO 26/27
      </footer>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
